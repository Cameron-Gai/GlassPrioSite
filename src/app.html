<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06038d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Glass Doctor — Request Service</title>
    <!-- Link previews when the URL is texted/shared (scrapers need absolute image URLs). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Glass Doctor — Request Service" />
    <meta
      property="og:description"
      content="Request glass, window, door, or hardware service online in about 2 minutes. Urgent issues dispatched same-day."
    />
    <meta property="og:image" content="https://glassfast.up.railway.app/og-card.png" />
    <meta name="twitter:card" content="summary_large_image" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
